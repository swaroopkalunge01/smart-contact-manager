<!doctype html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      th:replace="normal/base::layout(~{::section})">

<head>
<meta charset="UTF-8" />
<title>Show Contact</title>
</head>

<body>

<section>

    <div class="card mr-3 ml-3">

        <div class="card-body">

            <h1 class="text-center mb-4">

                Your Contacts

            </h1>
            
            <div class="text-right mb-3">

    <a th:href="@{/user/export/pdf}"
       class="btn btn-success">

        <i class="fas fa-file-pdf"></i>

        Export PDF

    </a>

</div>

            <!-- SEARCH START -->

            <div class="search-container my-3">

                <input
                    onkeyup="search()"
                    id="search-input"
                    type="text"
                    class="form-control"
                    placeholder="Search Your Contact" />

                <div class="search-result">

                    <!-- SEARCH RESULTS -->

                </div>

            </div>

            <!-- SEARCH END -->


            <div class="table-responsive">

                <table class="table table-hover">

                    <thead class="thead-light">

                        <tr>

                            <th scope="col">#ID</th>

                            <th scope="col">Name</th>

                            <th scope="col">Email</th>

                            <th scope="col">Phone</th>

                            <th scope="col">Action</th>

                        </tr>

                    </thead>

                    <tbody>

                        <tr th:each="c : ${contacts}">

                            <!-- CONTACT ID -->

                            <th scope="row"
                                th:text="${'SCM-USER-'+c.cId}">

                                1

                            </th>

                            <!-- NAME + IMAGE -->

                            <td>

                                <img
                                    th:src="@{'/img/'+${c.image}}"
                                    class="my_profile_picture" />

                                <span th:text="${c.name}"></span>

                            </td>

                            <!-- EMAIL -->

                            <td>

                                <a th:href="@{'/user/'+${c.cId}+'/contact'}">

                                    <span th:text="${c.email}"></span>

                                </a>

                            </td>

                            <!-- PHONE -->

                            <td th:text="${c.phone}"></td>

                            <!-- ACTION -->

                            <td>

    <div class="d-flex flex-column">

        <!-- FAVORITE -->

        <a th:href="@{'/user/favorite/'+${c.cId}}"
           class="btn btn-warning btn-sm mb-2">

            <i class="fa"
               th:classappend="${c.favorite} ? 'fa-star' : 'fa-star-o'">
            </i>

        </a>

        <!-- DELETE -->

        <a href="#"
           th:onclick="|deleteContact(${c.cId})|"
           class="btn btn-danger btn-sm mb-2">

            Delete

        </a>

        <!-- UPDATE -->

        <form method="post"
              th:action="@{'/user/update-contact/'+${c.cId}}">

            <button type="submit"
                    class="btn btn-primary btn-sm w-100">

                Update

            </button>

        </form>

    </div>

</td>

                        </tr>

                    </tbody>

                </table>

            </div>

            <!-- PAGINATION -->

            <nav aria-label="Page navigation example">

                <ul class="pagination">

                    <!-- PREVIOUS -->

                    <li th:if="${currentPage != 0}"
                        class="page-item">

                        <a th:href="@{'/user/show-contacts/'+${currentPage-1}}"
                           class="page-link">

                            Previous

                        </a>

                    </li>

                    <!-- PAGE NUMBERS -->

                    <li th:each="i : ${#numbers.sequence(1,totalPages)}"
                        th:classappend="${currentPage==i-1?'active':''}"
                        class="page-item">

                        <a th:href="@{'/user/show-contacts/'+${i-1}}"
                           class="page-link">

                            <span th:text="${i}"></span>

                        </a>

                    </li>

                    <!-- NEXT -->

                    <li th:if="${currentPage+1 != totalPages}"
                        class="page-item">

                        <a th:href="@{'/user/show-contacts/'+${currentPage+1}}"
                           class="page-link">

                            Next

                        </a>

                    </li>

                </ul>

            </nav>

        </div>

    </div>

</section>

</body>
</html>
