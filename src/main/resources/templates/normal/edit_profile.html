<!doctype html>

<html xmlns:th="http://www.thymeleaf.org"
      th:replace="normal/base :: layout(~{::section})">

<section>

<div class="container">

    <div class="row">

        <div class="col-md-8 offset-md-2">

            <div class="card mt-5">

                <div class="card-body">

                    <h2 class="text-center mb-4">

                        Update Profile

                    </h2>

                    <form th:action="@{/user/update-profile}"
                          method="post"
                          enctype="multipart/form-data"
                          th:object="${user}">


                        <!-- NAME -->

                        <div class="form-group">

                            <label>Name</label>

                            <input type="text"
                                   name="name"
                                   th:value="${user.name}"
                                   class="form-control">

                        </div>


                        <!-- EMAIL -->

                        <div class="form-group">

                            <label>Email</label>

                            <input type="email"
                                   name="email"
                                   th:value="${user.email}"
                                   class="form-control">

                        </div>


                        <!-- ABOUT -->

                        <div class="form-group">

                            <label>About</label>

                            <textarea name="about"
                                      class="form-control"
                                      rows="5"
                                      th:text="${user.about}">

                            </textarea>

                        </div>


                        <!-- IMAGE -->

                        <div class="form-group">

                            <label>Profile Image</label>

                            <input type="file"
                                   name="profileImage"
                                   class="form-control">

                        </div>


                        <button class="btn btn-primary btn-block">

                            Update Profile

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</section>

</html>
