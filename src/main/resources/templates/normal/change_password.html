<!doctype html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="normal/base :: layout(~{::section})">

<section>

<div class="container">

    <div class="row">

        <div class="col-md-6 offset-md-3">

            <div class="card mt-5">

                <div class="card-body">

                    <h3 class="text-center">
                        Change Password
                    </h3>

                    <form th:action="@{/user/change-password}"
                          method="post">

                        <div class="form-group">

                            <label>Old Password</label>

                            <input type="password"
                                   name="oldPassword"
                                   class="form-control">

                        </div>

                        <div class="form-group">

                            <label>New Password</label>

                            <input type="password"
                                   name="newPassword"
                                   class="form-control">

                        </div>

                        <button class="btn btn-primary btn-block">

                            Change Password

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</section>

</html>
